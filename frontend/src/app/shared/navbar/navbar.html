<header class="navbar" [class.con-sombra]="scrolled()">
  <div class="contenedor nav-inner">

    <!-- Logotipo y nombre de la app -->
    <a routerLink="/" class="logo">
      <span class="logo-icono">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="15" fill="#C13E28" />
          <path d="M8 20 Q8 12 16 12 Q24 12 24 20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="22" y="16" width="7" height="3.5" rx="1.75" fill="white" />
          <ellipse cx="16" cy="20" rx="7" ry="2.5" fill="white" opacity="0.9" />
        </svg>
      </span>
      <span class="logo-texto">LetHimCook</span>
    </a>

    <!-- Navegación principal para escritorio -->
    <nav class="nav-links" [class.abierto]="menuAbierto()">
      <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
      <a routerLink="/explorar" routerLinkActive="activo">Explorar</a>
      <a routerLink="/mapa" routerLinkActive="activo">Mapa</a>
      <a routerLink="/perfil" routerLinkActive="activo">Mi Perfil</a>
      <a routerLink="/contacto" routerLinkActive="activo">Contacto</a>
    </nav>

    <!-- Acciones del lado derecho -->
    <div class="nav-acciones">
      <a routerLink="/login" class="btn-secundario btn-sm">Entrar</a>
      <a routerLink="/login" class="btn-primario btn-sm">Únete</a>
    </div>

    <!-- Botón hamburguesa para móvil -->
    <button class="hamburguesa" (click)="toggleMenu()" [class.activo]="menuAbierto()" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
