<div class="preloader" [class.oculto]="!visible">

  <div class="preloader-viñeta" aria-hidden="true"></div>

  <!-- Patrón geométrico con parallax lentísimo -->
  <svg class="patron-fondo" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
       [style.transform]="pxPatron()">
    <defs>
      <!-- Máscara radial: blanco = visible, negro = oculto.
           Centro en negro (patrón no se ve), bordes en blanco (patrón visible). -->
      <radialGradient id="fade-centro" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="white" stop-opacity="0"/>
        <stop offset="38%"  stop-color="white" stop-opacity="0"/>
        <stop offset="62%"  stop-color="white" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="white" stop-opacity="1"/>
      </radialGradient>
      <mask id="mascara-patron">
        <rect width="100%" height="100%" fill="url(#fade-centro)"/>
      </mask>

      <!-- Tile grande: rombo triple con puntos de intersección -->
      <pattern id="geo-A" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
        <!-- Rombo exterior -->
        <polygon points="32,1 63,32 32,63 1,32"
                 fill="none" stroke="rgba(232,184,75,0.12)" stroke-width="0.9"/>
        <!-- Rombo medio -->
        <polygon points="32,13 51,32 32,51 13,32"
                 fill="none" stroke="rgba(232,184,75,0.07)" stroke-width="0.6"/>
        <!-- Rombo interior -->
        <polygon points="32,22 42,32 32,42 22,32"
                 fill="none" stroke="rgba(232,184,75,0.13)" stroke-width="0.8"/>
        <!-- Puntos en vértices del rombo exterior -->
        <circle cx="32" cy="1"  r="1.8" fill="rgba(232,184,75,0.18)"/>
        <circle cx="63" cy="32" r="1.8" fill="rgba(232,184,75,0.18)"/>
        <circle cx="32" cy="63" r="1.8" fill="rgba(232,184,75,0.18)"/>
        <circle cx="1"  cy="32" r="1.8" fill="rgba(232,184,75,0.18)"/>
        <!-- Puntos en vértices del rombo medio -->
        <circle cx="32" cy="13" r="1.1" fill="rgba(232,184,75,0.1)"/>
        <circle cx="51" cy="32" r="1.1" fill="rgba(232,184,75,0.1)"/>
        <circle cx="32" cy="51" r="1.1" fill="rgba(232,184,75,0.1)"/>
        <circle cx="13" cy="32" r="1.1" fill="rgba(232,184,75,0.1)"/>
        <!-- Marcas en esquinas del tile -->
        <circle cx="0"  cy="0"  r="1.4" fill="rgba(232,184,75,0.14)"/>
        <circle cx="64" cy="0"  r="1.4" fill="rgba(232,184,75,0.14)"/>
        <circle cx="0"  cy="64" r="1.4" fill="rgba(232,184,75,0.14)"/>
        <circle cx="64" cy="64" r="1.4" fill="rgba(232,184,75,0.14)"/>
        <!-- Centro -->
        <circle cx="32" cy="32" r="2.4" fill="rgba(232,184,75,0.1)"/>
        <!-- Cruces -->
        <line x1="32" y1="13" x2="32" y2="51" stroke="rgba(232,184,75,0.04)" stroke-width="0.5"/>
        <line x1="13" y1="32" x2="51" y2="32" stroke="rgba(232,184,75,0.04)" stroke-width="0.5"/>
      </pattern>

      <!-- Tile pequeño: retícula de diamantes menores -->
      <pattern id="geo-B" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
        <polygon points="16,2 30,16 16,30 2,16"
                 fill="none" stroke="rgba(232,184,75,0.05)" stroke-width="0.5"/>
        <circle cx="16" cy="2"  r="0.9" fill="rgba(232,184,75,0.08)"/>
        <circle cx="30" cy="16" r="0.9" fill="rgba(232,184,75,0.08)"/>
        <circle cx="16" cy="30" r="0.9" fill="rgba(232,184,75,0.08)"/>
        <circle cx="2"  cy="16" r="0.9" fill="rgba(232,184,75,0.08)"/>
      </pattern>
    </defs>

    <!-- Capa base de diamantes pequeños -->
    <rect class="patron-capa-b" width="100%" height="100%"
          fill="url(#geo-B)" mask="url(#mascara-patron)"/>
    <!-- Capa principal de diamantes grandes, deriva más lento -->
    <rect class="patron-capa-a" width="100%" height="100%"
          fill="url(#geo-A)" mask="url(#mascara-patron)"/>
  </svg>

  <div class="escena">

    <div class="sarten-zona">

      <!-- Anillos con su propio plano de parallax -->
      <div class="p-anillos" [style.transform]="pxAnillos()">
        <div class="anillo-exterior" aria-hidden="true"></div>
        <div class="anillos-oro" aria-hidden="true">
          <div class="a-oro ao-1"></div>
          <div class="a-oro ao-2"></div>
        </div>
      </div>

      <!-- Sartén con plano de parallax propio (wrapper externo no anima, interno sí) -->
      <div class="p-sarten" [style.transform]="pxSarten()">
        <div class="sarten-wrapper">

          <div class="sarten-aura" aria-hidden="true"></div>

          <svg class="sarten" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="72" cy="119" rx="50" ry="6" fill="#0D0005" opacity="0.55"/>
            <path d="M10 52 L18 108 L126 108 L134 52" fill="#484848"/>
            <ellipse cx="72" cy="108" rx="54" ry="10" fill="#2E2E2E"/>
            <ellipse cx="72" cy="52" rx="62" ry="14" fill="#383838"/>
            <ellipse cx="72" cy="50" rx="60" ry="12" fill="#545454"/>
            <rect x="108" y="43" width="13" height="18" rx="4" fill="#3A3A3A"/>
            <rect x="115" y="45" width="42" height="13" rx="6.5" fill="#7C4A2E"/>
            <line x1="120" y1="48" x2="152" y2="48" stroke="rgba(255,255,255,0.14)" stroke-width="1.5" stroke-linecap="round"/>
            <ellipse cx="72" cy="52" rx="52" ry="11" fill="#C44A24" opacity="0.97"/>
            <ellipse cx="72" cy="52" rx="40" ry="8"  fill="#E07040" opacity="0.42"/>
            <ellipse cx="72" cy="52" rx="20" ry="4"  fill="rgba(245,170,90,0.22)"/>
            <ellipse cx="56" cy="48" rx="15" ry="3.5" fill="rgba(255,255,255,0.18)"/>
          </svg>

          <div class="ingrediente tomate">
            <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
              <circle cx="14" cy="15" r="11" fill="#E03A2F"/>
              <path d="M14 4 Q17 8 14 10 Q11 8 14 4" fill="#4A7C59"/>
              <ellipse cx="11" cy="13" rx="2.5" ry="3" fill="rgba(255,255,255,0.2)"/>
            </svg>
          </div>

          <div class="ingrediente cebolla">
            <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="13" cy="14" rx="10" ry="8" fill="#E8B84B"/>
              <ellipse cx="13" cy="14" rx="6" ry="5" fill="rgba(255,255,255,0.25)"/>
              <path d="M13 6 Q15 9 13 11 Q11 9 13 6" fill="#C8964A"/>
            </svg>
          </div>

          <div class="ingrediente zanahoria">
            <svg viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 28 Q2 20 4 8 Q10 2 16 8 Q18 20 10 28Z" fill="#E87B2A"/>
              <path d="M10 2 Q12 0 10 4" stroke="#4A7C59" stroke-width="1.5" fill="none"/>
              <line x1="6" y1="12" x2="14" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
              <line x1="5" y1="17" x2="15" y2="17" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
            </svg>
          </div>

          <div class="ingrediente hierba">
            <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="11" cy="12" rx="8" ry="6" fill="#4A7C59"/>
              <path d="M11 6 Q14 3 11 8" fill="#3A6A49"/>
              <path d="M7 8 Q4 5 8 10" fill="#3A6A49"/>
            </svg>
          </div>

          <div class="ingrediente champi">
            <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 15 Q6 6 13 6 Q20 6 20 15Z" fill="#C8A882"/>
              <rect x="10" y="15" width="6" height="7" rx="2" fill="#D4BC9A"/>
              <ellipse cx="13" cy="11" rx="4" ry="2" fill="rgba(255,255,255,0.2)"/>
            </svg>
          </div>

          <div class="vapor" aria-hidden="true">
            <svg class="vapor-svg" viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg" overflow="visible">
              <path class="v1" d="M14 60 Q8 48 14 36 Q20 24 14 12"  stroke="rgba(232,184,75,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <path class="v2" d="M40 60 Q34 48 40 36 Q46 24 40 12"  stroke="rgba(232,184,75,0.45)" stroke-width="2"   fill="none" stroke-linecap="round"/>
              <path class="v3" d="M66 60 Q72 48 66 36 Q60 24 66 12"  stroke="rgba(232,184,75,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>

        </div>
      </div>

    </div>

    <!-- Marca con parallax inverso, parece el elemento más cercano -->
    <div class="p-marca" [style.transform]="pxMarca()">
      <div class="marca">
        <span class="nombre" aria-label="LetHimCook">
          <span class="letra" style="--i:0">L</span><span
                class="letra" style="--i:1">e</span><span
                class="letra" style="--i:2">t</span><span
                class="letra" style="--i:3">H</span><span
                class="letra" style="--i:4">i</span><span
                class="letra" style="--i:5">m</span><span
                class="letra" style="--i:6">C</span><span
                class="letra" style="--i:7">o</span><span
                class="letra" style="--i:8">o</span><span
                class="letra" style="--i:9">k</span>
        </span>
        <span class="tagline">preparando algo especial...</span>
        <div class="barra-carga" aria-hidden="true">
          <div class="barra-progreso"></div>
        </div>
      </div>
    </div>

  </div>

</div>
